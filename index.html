<script>


function vote(element,value){

let score=element.parentElement.querySelector("span");

score.innerHTML=parseInt(score.innerHTML)+value;

}




function addPost(){

let title=document.getElementById("title").value;

let text=document.getElementById("text").value;


if(title==""){

alert("Ajoute un titre");

return;

}



let post=document.createElement("div");

post.className="post";


post.innerHTML=`

<div class="votes">

<div class="up" onclick="vote(this,1)">▲</div>

<span>1</span>

<div class="down" onclick="vote(this,-1)">▼</div>

</div>


<div class="content">

<div class="sub">
r/new • maintenant
</div>


<div class="title">
${title}
</div>


<p>
${text}
</p>


<div class="actions">
💬 0 commentaires
↗ Partager
</div>


</div>

`;


document.getElementById("posts")
.prepend(post);


document.getElementById("title").value="";

document.getElementById("text").value="";

}





function darkMode(){

document.body.classList.toggle("dark");

}





document.getElementById("search")
.addEventListener("keyup",function(){

let value=this.value.toLowerCase();


document.querySelectorAll(".post")
.forEach(post=>{


if(post.innerText.toLowerCase().includes(value)){

post.style.display="flex";

}

else{

post.style.display="none";

}


});


});



</script>
